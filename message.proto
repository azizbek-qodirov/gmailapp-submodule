syntax = "proto3";

option go_package = "/internal/pkg/genproto";

package protos;


service MessageService {
  // rpc SearchMessages(MessagesSearchReq) returns (MessagesSearchRes);
}

message MessagesSearchReq {
  string query = 1;
  string user_id = 2;
  string date_from = 3;
  string date_to = 4;
}


message Attachment {
  string id = 1;
  string file_url = 2;
  string mime_type = 3;
  string file_size = 4;
}